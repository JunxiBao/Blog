<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPad Hall Effect</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Import maps polyfill -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="canvas-container"></div>


    <div id="ui-container">
        <div class="floating-panel glass-panel" id="main-panel">
            <div class="panel-title-bar" id="panel-toggle">
                <h2>Hall Effect Physics</h2>
                <span id="collapse-icon">▼</span>
            </div>
            <div id="panel-content">
                <div class="panel-header" style="border:none; padding:0; margin:0;">
                    <div class="data-readouts">
                    <div class="data-item">
                        <span class="data-label">Magnetic Field</span>
                        <span id="magnetic-field-status" class="data-value warning">Weak</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Hall Voltage</span>
                        <span id="sensor-voltage" class="data-value">3.3V</span>
                    </div>
                    <div class="data-item">
                        <span class="data-label">Screen State</span>
                        <span id="screen-state" class="data-value success">Awake</span>
                    </div>
                </div>
            </div>
            
            <div class="control-row" style="display: flex; gap: 2rem; align-items: flex-end; margin-top: 1rem; margin-bottom: 1.5rem; width: 100%;">
                <div class="control-section" style="flex: 1.2; margin: 0; width: 100%;">
                    <label for="cover-slider" style="display: block; margin-bottom: 8px; font-weight: 500; font-size: 0.9rem; color: var(--text-secondary);">Open / Close Cover</label>
                    <input type="range" id="cover-slider" min="0" max="180" value="180" step="1" style="width: 100%;">
                </div>
                <div class="control-section" style="flex: 1; margin: 0; width: 100%;">
                    <button id="focus-sensor-btn" class="glass-button focus-btn" style="width: 100%; margin: 0; padding: 0.65rem 1rem; box-sizing: border-box;">🔬 Focus on Sensor</button>
                </div>
            </div>

            <div class="info-section">
                <p id="explanation-text">When the cover is open, electrons flow straight through the sensor, maintaining a high voltage output (3.3V) that keeps the screen awake.</p>
            </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
